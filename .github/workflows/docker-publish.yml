name: Publish Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PUBLIC_URL: https://notes.gembolspwmanager.online
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/handy-notion-api
  WEB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/handy-notion-web

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            VITE_API_URL=${{ env.PUBLIC_URL }}
            VITE_AUTH_URL=${{ env.PUBLIC_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
